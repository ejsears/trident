[sgp40]

[temperature_sensor BME]
sensor_type: BME280
i2c_address: 119
i2c_mcu: AFC_Pro
i2c_software_scl_pin: AFC_Pro:PC11
i2c_software_sda_pin: AFC_Pro:PC10

[temperature_sensor SGP]
sensor_type: SGP40
i2c_mcu: AFC_Pro
i2c_software_scl_pin: AFC_Pro:PC11
i2c_software_sda_pin: AFC_Pro:PC10
ref_temp_sensor: bme280 BME
ref_humidity_sensor: bme280 BME

