[include fluidd.cfg]
[include config/*.cfg]
[include macros/*.cfg]
[include KAMP_Settings.cfg]
[include AFC/mcu/TurtleNeckv2.cfg]
[save_variables]
filename: ~/printer_data/config/variables.txt

[duplicate_pin_override]
pins: turtleneck:PB6

[danger_options]
log_config_file_at_startup: True
log_statistics: False
log_pressure_advance_changes: False
log_shutdown_info: False

#####################################################################
#   Filament sensor
#####################################################################

# [filament_switch_sensor Filament]
# pause_on_runout: False
# switch_pin: nhk:gpio13

# [filament_switch_sensor Hub]
# pause_on_runout: False
# switch_pin: ^turtleneck:PB6

#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 3600

# [safe_z_home]
# ##  XY Location of the Z Endstop Switch
# ##  Update -10,-10 to the XY coordinates of your endstop pin 
# ##  (such as 157,305) after going through Z Endstop Pin
# ##  Location Definition step.
# #home_xy_position:-10,-10
# home_xy_position: 125,125
# speed:100
# z_hop:10

[z_tilt]
##  Use Z_TILT_ADJUST to level the bed .
##  z_positions: Location of toolhead
z_positions:
    -50, 18
    125, 298
    300, 18
points:
    30, 5
    125, 195
    220, 5
    
speed: 200
horizontal_move_z: 10
retries: 12
retry_tolerance: 0.0075
adaptive_horizontal_move_z: true

########################################
# EXP1 / EXP2 (display) pins
########################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PG9, EXP1_2=PG12,
    EXP1_3=PG13, EXP1_4=PG14,
    EXP1_5=PC13, EXP1_6=PC14,    # Slot in the socket on this side
    EXP1_7=PC15, EXP1_8=PF0,
    EXP1_9=<GND>, EXP1_10=<5V>,
    
    # EXP2 header
    EXP2_1=PA6, EXP2_2=PA5,
    EXP2_3=PE2, EXP2_4=PE4,
    EXP2_5=PE3, EXP2_6=PA7,      # Slot in the socket on this side
    EXP2_7=PE5, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=PE4
    
[include AFC/*.cfg]

